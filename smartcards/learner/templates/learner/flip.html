<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Flip · {{ subject }}</title>
  <style>
    :root{ --bg:#0b1020; --panel:#131a2b; --muted:#a7b1c7; --border:#223; }
    html,body{height:100%}
    body{margin:0;background:var(--bg);color:#e8eef8;font-family:system-ui,Segoe UI,Roboto,Arial}
    header{position:sticky;top:0;background:var(--bg);border-bottom:1px solid var(--border)}
    .wrap{max-width:960px;margin:0 auto;padding:18px}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:10px 14px;border-radius:12px;
         background:#222b48;border:1px solid #3a415a;color:#e8eef8;text-decoration:none;cursor:pointer}
    .btn.ghost{background:transparent}
    .hint{color:var(--muted)}
    .row{display:flex;gap:10px;align-items:center;justify-content:space-between}
    main{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 80px);padding:18px}
    .stage{width:100%;max-width:900px}
    .progress{height:8px;background:#0f1426;border:1px solid var(--border);border-radius:999px;overflow:hidden}
    .bar{height:100%;background:linear-gradient(90deg,#7dd3fc,#a78bfa)}
    .controls{display:flex;gap:10px;justify-content:center;margin-top:14px;flex-wrap:wrap}
    .card-3d{position:relative;width:100%;height:min(56vh,420px);perspective:1000px;margin-top:18px}
    .inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .5s ease}
    .face{position:absolute;inset:0;padding:24px;border-radius:16px;border:1px solid var(--border);
          background:radial-gradient(800px 300px at 20% -20%,rgba(167,139,250,.15),transparent 55%),
                     radial-gradient(800px 300px at 120% 10%,rgba(125,211,252,.12),transparent 55%),
                     var(--panel);
          backface-visibility:hidden; display:flex; align-items:center; justify-content:center}
    .front .label, .back .label{position:absolute;top:12px;left:14px;font-size:12px;color:var(--muted);
          border:1px solid var(--border);border-radius:999px;padding:4px 8px}
    .front .content, .back .content{max-width:720px;font-size:22px;line-height:1.45;text-align:center;white-space:pre-wrap}
    .back{transform:rotateY(180deg)}
    .flipped .inner{transform:rotateY(180deg)}
    .pill{display:inline-block;font-size:12px;border:1px solid var(--border);padding:4px 8px;border-radius:999px;color:var(--muted)}
    /* toast */
    .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);
           background:#0f1426;border:1px solid var(--border);color:#dbeafe;border-radius:12px;padding:10px 14px;
           opacity:0;transition:opacity .25s ease, transform .25s ease;pointer-events:none}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
<header>
  <div class="wrap row">
    <a class="btn" href="{% url 'learner:menu' %}">← Fächer</a>
    <div class="pill">{{ subject }}</div>
  </div>
</header>

<main>
  <div class="stage">
    <div class="row">
      <div class="hint">Karten gesamt: {{ total }}</div>
      <div class="hint"><span id="counter">1</span> / {{ total }}</div>
    </div>
    <div class="progress" aria-hidden="true"><div id="bar" class="bar" style="width:0%"></div></div>

    <div id="flipcard" class="card-3d" tabindex="0" aria-live="polite">
      <div class="inner">
        <section class="face front">
          <div class="label">Frage</div>
          <div id="frontText" class="content"></div>
        </section>
        <section class="face back">
          <div class="label">Antwort</div>
          <div id="backText" class="content"></div>
        </section>
      </div>
    </div>

    <div class="controls">
      <button id="prevBtn" class="btn" type="button">← Zurück</button>
      <button id="flipBtn" class="btn" type="button">Antwort anzeigen (Leertaste)</button>
      <!-- This button is only enabled when answer is visible -->
      <button id="repeatBtn" class="btn ghost" type="button" disabled>⟲ Frage wiederholen</button>
      <button id="nextBtn" class="btn" type="button">Weiter →</button>
      <a id="doneBtn" class="btn" href="{% url 'learner:menu' %}">Fertig</a>
    </div>
  </div>
</main>

<div id="toast" class="toast" role="status" aria-live="polite">Zur Wiederholung ans Ende gelegt</div>

{{ cards|json_script:"cards-data" }}

<script>
  // Load cards safely
  const CARDS = JSON.parse(document.getElementById("cards-data").textContent);
  let idx = 0, flipped = false, order = [...Array(CARDS.length).keys()];

  const flipcard = document.getElementById('flipcard');
  const frontText = document.getElementById('frontText');
  const backText  = document.getElementById('backText');
  const counter   = document.getElementById('counter');
  const bar       = document.getElementById('bar');
  const flipBtn   = document.getElementById('flipBtn');
  const nextBtn   = document.getElementById('nextBtn');
  const prevBtn   = document.getElementById('prevBtn');
  const repeatBtn = document.getElementById('repeatBtn');
  const toast     = document.getElementById('toast');

  function render(){
    const i = order[idx], c = CARDS[i];
    frontText.textContent = c.question || "";
    backText.textContent  = c.answer   || "";
    counter.textContent = (idx+1).toString();
    bar.style.width = (100 * idx / Math.max(1, order.length-1)) + "%";
    flipcard.classList.toggle('flipped', flipped);
    repeatBtn.disabled = !flipped; // only active when answer is visible
    flipcard.focus({preventScroll:true});
    // Update flip button label
    flipBtn.textContent = flipped ? 'Frage verbergen' : 'Antwort anzeigen (Leertaste)';
  }

  function flip(){ flipped = !flipped; render(); }
  function next(){
    if (idx < order.length - 1) { idx++; flipped = false; render(); }
    else { window.location.href = "{% url 'learner:menu' %}"; }
  }
  function prev(){ if (idx > 0) { idx--; flipped = false; render(); } }

  function showToast(msg){
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(()=> toast.classList.remove('show'), 1100);
  }

  // NEW: repeat current question (append to end)
  function repeatCurrent(){
    if (!flipped) return; // only when answer is visible
    const currentIndexValue = order[idx];
    // If this is already the last item, no need to duplicate (optional behavior)
    if (idx !== order.length - 1) {
      order.push(currentIndexValue);
      showToast('Zur Wiederholung ans Ende gelegt');
    } else {
      showToast('Schon am Ende eingeplant');
    }
    next(); // move on immediately
  }

  // Events
  flipBtn.addEventListener('click', flip);
  nextBtn.addEventListener('click', next);
  prevBtn.addEventListener('click', prev);
  repeatBtn.addEventListener('click', repeatCurrent);
  flipcard.addEventListener('click', flip);

  // Keyboard
  window.addEventListener('keydown', (e)=>{
    if (e.key === ' ') { e.preventDefault(); flip(); }
    else if (e.key === 'ArrowRight') next();
    else if (e.key === 'ArrowLeft')  prev();
    else if (e.key.toLowerCase() === 'r' && flipped) repeatCurrent(); // quick shortcut
  });

  render();
</script>
</body>
</html>
